<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EduLearn - 修改密码</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body data-page="password">
  <header class="app-header center-title">
    <div class="brand-wrap">
      <a class="back-btn" href="profile.html" data-back-target="profile.html">返回</a>
      <div class="brand-line">
        <span class="logo-e">E</span>
        <h1 class="brand">EduLearn</h1>
      </div>
      <p class="page-title">修改密码</p>
    </div>
    <div class="header-user">
      <img id="headerAvatar" class="avatar" alt="avatar" />
      <span id="headerName">加载中...</span>
      <button id="logoutBtn" class="btn ghost">退出登录</button>
    </div>
  </header>

  <main class="container with-nav narrow">
    <section class="card">
      <h2>账户安全</h2>
      <form id="passwordForm" class="column-form">
        <label for="oldPassword">旧密码</label>
        <input id="oldPassword" name="oldPassword" type="password" minlength="8" maxlength="16" required />

        <label for="newPassword">新密码（8~16 位，字母+数字）</label>
        <input id="newPassword" name="newPassword" type="password" minlength="8" maxlength="16" required />

        <label for="confirmPassword">重复新密码</label>
        <input id="confirmPassword" name="confirmPassword" type="password" minlength="8" maxlength="16" required />

        <button class="btn primary" type="submit">保存新密码</button>
      </form>
      <div id="passwordMsg" class="hint-box"></div>
    </section>
  </main>

  <nav class="bottom-nav">
    <a href="index.html">首页</a>
    <a href="subscribe.html">订阅</a>
    <a class="active" href="profile.html">我的</a>
  </nav>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase-config.js"></script>
  <script src="keep-alive.js"></script>
  <script src="script.js"></script>
</body>
</html>
