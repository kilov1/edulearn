<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EduLearn - 订阅专属内容</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body data-page="premium">
  <header class="app-header center-title">
    <div class="brand-wrap">
      <a class="back-btn" href="subscribe.html" data-back-target="subscribe.html">返回</a>
      <div class="brand-line">
        <span class="logo-e">E</span>
        <h1 class="brand">EduLearn</h1>
      </div>
      <p class="page-title">订阅专属内容</p>
    </div>
    <div class="header-user">
      <img id="headerAvatar" class="avatar" alt="avatar" />
      <span id="headerName">加载中...</span>
      <button id="logoutBtn" class="btn ghost">退出登录</button>
    </div>
  </header>

  <main class="container with-nav">
    <section class="card">
      <h2>知识资源</h2>
      <p class="muted">点击下方资源进入阅读</p>
      <div id="premiumResourceList" class="premium-list"></div>
    </section>

    <section class="card">
      <h2>精品习题集</h2>
      <p class="muted">点击试卷进入答题</p>
      <div id="premiumPaperList" class="premium-list"></div>
    </section>
  </main>

  <nav class="bottom-nav">
    <a href="index.html">首页</a>
    <a class="active" href="subscribe.html">订阅</a>
    <a href="profile.html">我的</a>
  </nav>

  <script src="supabase-loader.js"></script>
  <script src="supabase-config.js"></script>
  <script src="keep-alive.js"></script>
  <script src="script.js"></script>
</body>
</html>
