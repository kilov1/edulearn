<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EduLearn - 忘记密码</title>
  <link rel="stylesheet" href="auth.css" />
</head>
<body data-page="forgot-password">
  <div class="card">
    <div class="auth-brand-line">
      <span class="logo-e">E</span>
      <h1 class="auth-brand">EduLearn</h1>
    </div>
    <h2>重置密码</h2>
    <p>请输入注册时使用的邮箱，我们将发送重置链接。只有已注册的邮箱才能收到链接。</p>

    <form id="forgotForm">
      <label for="email">邮箱</label>
      <input id="email" name="email" type="email" required placeholder="请输入注册邮箱" />

      <button type="submit">发送重置链接</button>
    </form>

    <div id="message" class="msg"></div>
    <div class="links"><a href="login.html">返回登录</a></div>
  </div>

  <script src="supabase-loader.js"></script>
  <script src="supabase-config.js"></script>
  <script src="auth-forgot.js"></script>
</body>
</html>
