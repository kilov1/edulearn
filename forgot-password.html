<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EduLearn - 忘记密码</title>
  <link rel="stylesheet" href="auth.css" />
</head>
<body data-page="forgot-password">
  <div class="card">
    <div class="auth-brand-line">
      <span class="logo-e">E</span>
      <h1 class="auth-brand">EduLearn</h1>
    </div>
    <h2 id="stepTitle">重置密码</h2>
    <p id="stepDesc">请输入注册时使用的邮箱，输入后可直接设置新密码。</p>

    <!-- 步骤1：输入邮箱 -->
    <div id="stepEmail">
      <form id="emailForm">
        <label for="email">邮箱</label>
        <input id="email" name="email" type="email" required placeholder="请输入注册邮箱" autocomplete="email" />

        <button type="submit">下一步</button>
      </form>
    </div>

    <!-- 步骤2：设置新密码 -->
    <div id="stepPassword" class="hidden">
      <p class="hint" style="margin-bottom: 12px;">邮箱：<span id="displayEmail"></span> <a href="#" id="backToEmail" style="font-size: 13px;">更换邮箱</a></p>
      <form id="passwordForm">
        <input type="hidden" id="verifiedEmail" name="verifiedEmail" />

        <label for="newPassword">新密码（8~16 位，字母+数字）</label>
        <input id="newPassword" name="newPassword" type="password" minlength="8" maxlength="16" required placeholder="请输入新密码" autocomplete="new-password" />
        <div class="strength-wrap">
          <div id="strengthBar" class="strength-bar"></div>
        </div>
        <div id="strengthText" class="hint">密码需 8~16 位，包含字母和数字</div>

        <label for="confirmPassword">确认新密码</label>
        <input id="confirmPassword" name="confirmPassword" type="password" minlength="8" maxlength="16" required placeholder="请再次输入新密码" autocomplete="new-password" />
        <div id="confirmCheck" class="hint"></div>

        <button type="submit">保存新密码</button>
      </form>
    </div>

    <div id="message" class="msg"></div>
    <div class="links">
      <a href="login.html">返回登录</a>
    </div>
  </div>

  <script src="supabase-loader.js"></script>
  <script src="supabase-config.js"></script>
  <script src="auth-forgot.js"></script>
</body>
</html>
