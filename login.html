<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EduLearn - 登录</title>
  <link rel="stylesheet" href="auth.css" />
</head>
<body data-page="login">
  <div class="card">
    <div class="auth-brand-line">
      <span class="logo-e">E</span>
      <h1 class="auth-brand">EduLearn</h1>
    </div>
    <h2>欢迎登录</h2>
    <p>登录后可进入学习首页、订阅中心与个人中心。</p>

    <form id="loginForm">
      <label for="username">用户名或邮箱</label>
      <input id="username" name="username" type="text" minlength="3" maxlength="64" required placeholder="用户名或邮箱" />

      <label for="password">密码</label>
      <input id="password" name="password" type="password" minlength="8" maxlength="16" required />

      <button type="submit">登录</button>
    </form>

    <div id="message" class="msg"></div>
    <div class="links">
      没有账号？<a href="register.html">去注册</a>
      <span style="margin: 0 8px;">|</span>
      <a href="forgot-password.html">忘记密码</a>
    </div>
  </div>

  <script src="supabase-loader.js"></script>
  <script src="supabase-config.js"></script>
  <script src="route-guard.js"></script>
  <script src="auth.js"></script>
</body>
</html>
