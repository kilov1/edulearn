<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EduLearn - 设置新密码</title>
  <link rel="stylesheet" href="auth.css" />
</head>
<body data-page="reset-password">
  <div class="card">
    <div class="auth-brand-line">
      <span class="logo-e">E</span>
      <h1 class="auth-brand">EduLearn</h1>
    </div>
    <h2>设置新密码</h2>
    <p>请输入您的新密码。</p>

    <form id="resetForm">
      <label for="newPassword">新密码（8~16 位，字母+数字）</label>
      <input id="newPassword" name="newPassword" type="password" minlength="8" maxlength="16" required />

      <label for="confirmPassword">确认新密码</label>
      <input id="confirmPassword" name="confirmPassword" type="password" minlength="8" maxlength="16" required />

      <button type="submit">保存新密码</button>
    </form>

    <div id="message" class="msg"></div>
    <div class="links"><a href="login.html">返回登录</a></div>
  </div>

  <script src="supabase-loader.js"></script>
  <script src="supabase-config.js"></script>
  <script src="auth-reset.js"></script>
</body>
</html>
